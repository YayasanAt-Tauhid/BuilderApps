name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Paraglide messages are generated; compile before type-checking.
      - run: pnpm exec paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm type-check:backend
      - run: pnpm test:unit --run
      - run: pnpm test:integration --run
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
